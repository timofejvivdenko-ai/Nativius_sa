<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Nevitius - 2011 Master Edition</title>
    <style>
        body { background: #E1E1E1 url('https://web.archive.org'); font-family: Verdana, Arial; margin: 0; }
        header { background: #003399; color: white; padding: 0 20px; display: flex; align-items: center; border-bottom: 3px solid #002266; height: 55px; position: sticky; top: 0; z-index: 100; }
        #announcement-bar { background: #FF4444; color: white; padding: 10px; text-align: center; font-weight: bold; font-size: 13px; display: none; border-bottom: 2px solid #880000; }
        .search-container { flex-grow: 1; display: flex; justify-content: center; }
        #search-bar { width: 400px; padding: 7px; border-radius: 3px; border: 1px solid #001a4d; outline: none; }
        .container { width: 1400px; margin: 15px auto; background: rgba(255,255,255,0.95); border: 1px solid #999; display: flex; min-height: 900px; box-shadow: 0 0 20px rgba(0,0,0,0.2); }
        .sidebar { width: 230px; border-right: 1px solid #CCC; padding: 15px; background: #F8F8F8; }
        .sidebar a { display: block; padding: 12px; color: #333; text-decoration: none; border-bottom: 1px solid #EEE; font-size: 13px; font-weight: bold; cursor: pointer; }
        .sidebar a:hover { background: #EEE; color: #003399; }
        .main { flex-grow: 1; padding: 40px; }
        .btn { background: linear-gradient(#00FF00, #008800); color: white; border: 1px solid #006600; padding: 8px 15px; cursor: pointer; font-weight: bold; border-radius: 3px; }
        .btn-red { background: linear-gradient(#FF4444, #CC0000); border: 1px solid #990000; }
        .download-btn { background: linear-gradient(#FFD700, #B8860B); color: black; padding: 8px 15px; text-decoration: none; font-weight: bold; border-radius: 3px; font-size: 12px; margin-right: 20px; border: 1px solid #8B4513; }
        .card { display: inline-block; width: 220px; border: 1px solid #CCC; padding: 12px; margin: 10px; text-align: center; background: white; vertical-align: top; position: relative; }
        .card img { width: 200px; height: 200px; object-fit: cover; border: 1px solid #EEE; }
        input, select, textarea { padding: 10px; margin: 8px 0; width: 90%; border: 1px solid #999; font-family: Verdana; }
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #003399; z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .bc-badge { background: #FFD700; color: #000; padding: 2px 6px; font-size: 11px; border-radius: 3px; margin-left: 8px; font-weight: bold; border: 1px solid #B8860B; }
    </style>
</head>
<body id="site-body">

<div id="announcement-bar"></div>

<div id="auth-screen">
    <div style="background:white; padding:40px; border:6px solid #002266; text-align:center; width:450px;">
        <h1 style="font-size:55px; letter-spacing:-4px; margin:0 0 20px 0; color:black; font-family:Verdana;">NEVITIUS</h1>
        <input type="text" id="reg-u" placeholder="Username">
        <input type="email" id="reg-e" placeholder="Email">
        <input type="password" id="reg-p" placeholder="Password"><br><br>
        <button class="btn" style="width:100%; font-size:20px; padding:15px;" onclick="auth()">JOIN NEVITIUS</button>
    </div>
</div>

<header>
    <div style="font-size:28px; font-weight:bold; cursor:pointer;" onclick="showPage('home')">NEVITIUS</div>
    <div class="search-container"><input type="text" id="search-bar" placeholder="Search Games..." onkeyup="search()"></div>
    <a href="https://drive.usercontent.com" class="download-btn">Download App</a>
    <div id="u-disp" style="font-weight:bold; font-size:14px;"></div>
    <div style="margin-left:20px; color:#E6B800; font-weight:bold; font-size:18px;" id="tix-disp">T$ 0</div>
</header>

<div class="container">
    <div class="sidebar" id="sidebar">
        <a onclick="showPage('home')">Games</a>
        <a onclick="showPage('catalog')">Catalog</a>
        <a onclick="showPage('creations')">Creations</a>
        <a onclick="showPage('friends')">Friends</a>
        <a onclick="showPage('groups')">Groups</a>
        <a onclick="showPage('inventory')">Inventory</a>
        <a onclick="showPage('settings')">Settings</a>
    </div>
    <div class="main" id="content"></div>
</div>

<script>
    const ADMIN_EMAIL = "T.vivdenko@outlook.com";

    let db = JSON.parse(localStorage.getItem('nev_v18_db')) || { 
        users: [], catalog: [], places: [], groups: [], bans: [], alert: "", bcCode: "NEVITIUS_2026" 
    };
    let session = JSON.parse(localStorage.getItem('nev_v18_sess'));

    function save() { 
        localStorage.setItem('nev_v18_db', JSON.stringify(db)); 
        localStorage.setItem('nev_v18_sess', JSON.stringify(session)); 
    }

    function checkHourlyBonus() {
        if (!session) return;
        const now = Date.now();
        if (!session.lastBonus) { session.lastBonus = now; save(); return; }
        if (now - session.lastBonus >= 3600000) {
            let hours = Math.floor((now - session.lastBonus) / 3600000);
            session.tix += hours * 5;
            session.lastBonus = now;
            let u = db.users.find(x => x.email === session.email);
            if(u) { u.tix = session.tix; u.lastBonus = now; }
            save();
            document.getElementById('tix-disp').innerText = "T$ " + session.tix;
            alert("Бонус: +" + (hours * 5) + " T$!");
        }
    }

    function auth() {
        const u = document.getElementById('reg-u').value, e = document.getElementById('reg-e').value, p = document.getElementById('reg-p').value;
        if(!u || !e || !p) return alert("Fill all fields!");
        if(db.bans.includes(e)) return alert("BANNED");
        let existingUser = db.users.find(x => x.email === e);
        if(existingUser) {
            if(existingUser.password === p) { session = existingUser; } 
            else { return alert("WRONG PASSWORD!"); }
        } else {
            let newUser = { username: u, email: e, password: p, tix: 100, inv: [], friends: [], bc: false, bday: "2011-01-01", role: (e === ADMIN_EMAIL ? 'admin' : 'user'), bg: "", lastBonus: Date.now() };
            db.users.push(newUser); session = newUser;
        }
        save(); location.reload();
    }

    async function toB64(input) { 
        if(!input || !input.files) return "";
        return new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(input.files); }); 
    }

    function showPage(page) {
        const c = document.getElementById('content');
        if(page === 'home') {
            c.innerHTML = `<h1>Games</h1>` + (db.places.length ? db.places.map(p => `<div class="card"><img src="${p.img}"><b>${p.title}</b><br><small>By ${p.author}</small><br><br><button class="btn" onclick="window.open('${p.url}')">Play</button></div>`).join('') : "<p>No games published yet.</p>");
        }
        else if(page === 'catalog') {
            c.innerHTML = `<h1>Catalog</h1>` + (db.catalog.length ? db.catalog.map(i => `<div class="card"><img src="${i.img}"><b>${i.name}</b><br>Price: ${i.price} T$<br><button class="btn" onclick="buyItem(${i.id})">Buy</button></div>`).join('') : "<p>Catalog is empty.</p>");
        }
        else if(page === 'creations') {
            c.innerHTML = `<h1>Creations</h1><h3>Create Game</h3><input id="pT" placeholder="Game Title"><br><input id="pU" placeholder="Game URL"><br>Icon: <input type="file" id="pI"><br><button class="btn" onclick="addPlace()">Publish Game</button>`;
        }
        else if(page === 'friends') {
            c.innerHTML = `<h1>Friends</h1><p>Search for users:</p><input id="fS" placeholder="Username"><button class="btn">Search</button>`;
        }
        else if(page === 'groups') {
            c.innerHTML = `<h1>Groups</h1><input id="gN" placeholder="Group Name"><button class="btn">Create (50 T$)</button>`;
        }
        else if(page === 'inventory') {
            c.innerHTML = `<h1>Inventory</h1>` + (session.inv.length ? session.inv.map(i => `<div class="card"><img src="${i.img}"><b>${i.name}</b></div>`).join('') : "<p>Empty.</p>");
        }
        else if(page === 'admin') {
            c.innerHTML = `<h1>Admin Master Panel</h1>
            <div style="border:3px solid red; padding:20px; background:#FFF5F5;">
                <h3>BC Code Generator (100 Years Validity)</h3>
                <p>Current Active Code: <b style="font-size:20px; color:blue;">${db.bcCode}</b></p>
                <button class="btn" onclick="generateBC()">Generate Random Code</button>
                <hr>
                <h3>Announcement Bar</h3>
                <input id="alertMsg" placeholder="Text..." value="${db.alert}"><button class="btn" onclick="setAlert()">Update</button>
                <hr>
                <h3>Catalog</h3>
                <input id="iN" placeholder="Name"><input id="iP" placeholder="Price"><br>Icon: <input type="file" id="iI"><br><button class="btn" onclick="addCatalog()">Add</button>
                <hr>
                <h3>User Control</h3>
                <input id="mE" placeholder="Email"><input id="mA" placeholder="T$ Amount"><br>
                <button class="btn" onclick="giveTickets()">Give T$</button><button class="btn btn-red" onclick="banUser()">Ban</button>
            </div>`;
        }
        else if(page === 'settings') {
            c.innerHTML = `<h1>Settings</h1>
                <b>Builders Club:</b> ${session.bc ? '<span style="color:gold; font-weight:bold;">ACTIVE</span>' : '<input id="bcC" placeholder="Enter Code"><button class="btn" onclick="actBC()">Activate</button>'}
                <hr>
                <h3>Background</h3>
                <input type="color" id="bgColor"> <input type="file" id="bgImg"><br><br>
                <button class="btn" onclick="applySettings()">Save</button>`;
        }
    }

    if(session) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('u-disp').innerHTML = session.username + (session.bc ? ' <span class="bc-badge">BC</span>' : '');
        document.getElementById('tix-disp').innerText = "T$ " + session.tix;
        if(session.role === 'admin') { document.getElementById('sidebar').innerHTML += `<a onclick="showPage('admin')" style="color:red">ADMIN</a>`; }
        if(session.bg) document.body.style.background = session.bg;
        checkHourlyBonus(); setInterval(checkHourlyBonus, 60000);
    }

    function generateBC() {
        const newCode = "BC-" + Math.floor(1000 + Math.random() * 9000);
        db.bcCode = newCode;
        save();
        alert("Generated! New code is: " + newCode);
        showPage('admin');
    }

    function actBC() {
        if(document.getElementById('bcC').value === db.bcCode) {
            session.bc = true;
            let u = db.users.find(x => x.email === session.email);
            if(u) u.bc = true;
            save(); alert("Builders Club Activated!"); location.reload();
        } else { alert("Wrong Code!"); }
    }

    function setAlert() { db.alert = document.getElementById('alertMsg').value; save(); location.reload(); }
    function clearAlert() { db.alert = ""; save(); location.reload(); }
    if(db.alert) { let b = document.getElementById('announcement-bar'); b.innerText = db.alert; b.style.display = 'block'; }

    async function addCatalog() {
        const n = document.getElementById('iN').value, p = document.getElementById('iP').value, i = await toB64(document.getElementById('iI'));
        db.catalog.push({ name: n, price: parseInt(p), img: i, id: Date.now() });
        save(); alert("Added!");
    }

    async function addPlace() {
        const t = document.getElementById('pT').value, u = document.getElementById('pU').value, i = await toB64(document.getElementById('pI'));
        db.places.push({ title: t, url: u, img: i, author: session.username });
        save(); showPage('home');
    }

    function buyItem(id) {
        let item = db.catalog.find(x => x.id === id);
        if(session.tix >= item.price) {
            session.tix -= item.price; session.inv.push(item);
            let u = db.users.find(x => x.email === session.email);
            u.tix = session.tix; u.inv = session.inv;
            save(); alert("Success!"); location.reload();
        } else alert("No money!");
    }

    function giveTickets() {
        let u = db.users.find(x => x.email === document.getElementById('mE').value);
        if(u) { u.tix += parseInt(document.getElementById('mA').value); save(); alert("Done!"); }
    }

    function banUser() { db.bans.push(document.getElementById('mE').value); save(); alert("Banned!"); }

    async function applySettings() {
        const clr = document.getElementById('bgColor').value, img = await toB64(document.getElementById('bgImg'));
        session.bg = img ? `url(${img})` : clr;
        let u = db.users.find(x => x.email === session.email);
        if(u) u.bg = session.bg;
        save(); location.reload();
    }

    function search() {
        let q = document.getElementById('search-bar').value.toLowerCase();
        let cards = document.getElementsByClassName('card');
        for(let c of cards) { c.style.display = c.innerText.toLowerCase().includes(q) ? 'inline-block' : 'none'; }
    }

    showPage('home');
</script>
</body>
</html>
