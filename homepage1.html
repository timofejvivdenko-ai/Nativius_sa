<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Nevitius - Global Server 1</title>
    <style>
        body { background: #E1E1E1 url('https://web.archive.org'); font-family: Verdana, Arial; margin: 0; }
        header { background: #003399; color: white; padding: 0 20px; display: flex; align-items: center; border-bottom: 3px solid #002266; height: 55px; position: sticky; top: 0; z-index: 100; }
        #announcement-bar { background: #FF4444; color: white; padding: 10px; text-align: center; font-weight: bold; font-size: 13px; display: none; border-bottom: 2px solid #880000; }
        .container { width: 1400px; margin: 15px auto; background: white; border: 1px solid #999; display: flex; min-height: 900px; box-shadow: 0 0 20px rgba(0,0,0,0.2); }
        .sidebar { width: 230px; border-right: 1px solid #CCC; padding: 15px; background: #F8F8F8; }
        .sidebar a { display: block; padding: 12px; color: #333; text-decoration: none; border-bottom: 1px solid #EEE; font-size: 13px; font-weight: bold; cursor: pointer; }
        .sidebar a:hover { background: #EEE; color: #003399; }
        .main { flex-grow: 1; padding: 40px; }
        .btn { background: linear-gradient(#00FF00, #008800); color: white; border: 1px solid #006600; padding: 8px 15px; cursor: pointer; font-weight: bold; border-radius: 3px; }
        .btn-red { background: linear-gradient(#FF4444, #CC0000); border: 1px solid #990000; }
        .card { display: inline-block; width: 220px; border: 1px solid #CCC; padding: 12px; margin: 10px; text-align: center; background: white; vertical-align: top; position: relative; }
        .card img { width: 200px; height: 200px; object-fit: cover; border: 1px solid #EEE; margin-bottom: 10px; }
        .limited-tag { background: #800; color: #FFD700; font-size: 10px; font-weight: bold; position: absolute; top: 5px; right: 5px; padding: 2px 5px; border: 1px solid #FFD700; }
        input, textarea { padding: 10px; margin: 8px 0; width: 95%; border: 1px solid #999; }
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #003399; z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .download-btn { background: linear-gradient(#FFD700, #B8860B); color: black; padding: 8px 15px; text-decoration: none; font-weight: bold; border-radius: 3px; font-size: 12px; margin-right: 20px; border: 1px solid #8B4513; }
        .bc-badge { background: #FFD700; color: #000; padding: 2px 6px; font-size: 11px; border-radius: 3px; margin-left: 8px; font-weight: bold; border: 1px solid #B8860B; }
    </style>
</head>
<body>

<div id="announcement-bar"></div>

<div id="auth-screen">
    <div style="background:white; padding:40px; border:6px solid #002266; text-align:center; width:450px;">
        <h1 style="font-size:55px; letter-spacing:-4px; margin:0 0 20px 0;">NEVITIUS</h1>
        <input type="text" id="reg-u" placeholder="Username">
        <input type="email" id="reg-e" placeholder="Email">
        <input type="password" id="reg-p" placeholder="Password"><br><br>
        <button class="btn" style="width:100%; font-size:18px;" onclick="window.auth()">JOIN NEVITIUS</button>
    </div>
</div>

<header>
    <div style="font-size:30px; font-weight:bold; cursor:pointer;" onclick="showPage('home')">NEVITIUS</div>
    <div style="flex-grow:1; text-align:center;"><input type="text" id="search-bar" placeholder="Search Global Games..." onkeyup="search()"></div>
    <a href="https://drive.usercontent.google.com" class="download-btn">Download App</a>
    <div id="u-disp" style="font-weight:bold; font-size:14px;"></div>
    <div style="margin-left:20px; color:#E6B800; font-weight:bold; font-size:18px;" id="tix-disp">T$ 0</div>
</header>

<div class="container">
    <div class="sidebar" id="sidebar">
        <a onclick="showPage('home')">Games</a>
        <a onclick="showPage('catalog')">Catalog</a>
        <a onclick="showPage('creations')">Creations</a>
        <a onclick="showPage('friends')">Friends</a>
        <a onclick="showPage('groups')">Groups</a>
        <a onclick="showPage('inventory')">Inventory</a>
        <a onclick="showPage('settings')">Settings</a>
    </div>
    <div class="main" id="content"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com";
    import { getDatabase, ref, set, get, onValue, update, push } from "https://www.gstatic.com";

    const firebaseConfig = {
        apiKey: "AIzaSyBvy9XdQshAmLA0i2QaIzyU0VJ4hwHg9Io",
        authDomain: "server1-613d2.firebaseapp.com",
        projectId: "server1-613d2",
        storageBucket: "server1-613d2.firebasestorage.app",
        messagingSenderId: "905505846473",
        appId: "1:905505846473:web:27ef9b1df16571a45f8918",
        databaseURL: "https://server1-613d2-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Список адмінів
    const ADMINS = ["T.vivdenko@outlook.com", "N.owner@outlook.com"];

    window.auth = async () => {
        const u = document.getElementById('reg-u').value, e = document.getElementById('reg-e').value, p = document.getElementById('reg-p').value;
        if(!u || !e || !p) return alert("Fill all!");
        const safeEmail = btoa(e).replace(/=/g, "");
        const userRef = ref(db, 'users/' + safeEmail);
        const snapshot = await get(userRef);
        
        if(snapshot.exists()) {
            const userData = snapshot.val();
            if(userData.password === p) {
                localStorage.setItem('nev_sess', JSON.stringify(userData));
                location.reload();
            } else alert("Wrong Password!");
        } else {
            const newUser = { 
                username: u, 
                email: e, 
                password: p, 
                tix: 100, 
                inv: [], 
                friends: [], 
                bc: false, 
                role: (ADMINS.includes(e) ? 'admin' : 'user') 
            };
            await set(userRef, newUser);
            localStorage.setItem('nev_sess', JSON.stringify(newUser));
            location.reload();
        }
    };

    onValue(ref(db, 'global'), (snap) => {
        window.globalData = snap.val() || { places: {}, catalog: {}, groups: {}, alert: "" };
        if(window.currentPage === 'home' || window.currentPage === 'catalog') showPage(window.currentPage);
        if(window.globalData.alert) {
            document.getElementById('announcement-bar').innerText = window.globalData.alert;
            document.getElementById('announcement-bar').style.display = "block";
        } else {
            document.getElementById('announcement-bar').style.display = "none";
        }
    });

    window.pushPlace = async (data) => {
        const newRef = push(ref(db, 'global/places'));
        await set(newRef, data);
        alert("Published Online!");
    };

    window.pushCatalog = async (data) => {
        const newRef = push(ref(db, 'global/catalog'));
        await set(newRef, data);
        alert("Item added!");
    };

    window.updateUser = (data) => {
        const safeEmail = btoa(data.email).replace(/=/g, "");
        update(ref(db, 'users/' + safeEmail), data);
        localStorage.setItem('nev_sess', JSON.stringify(data));
    };

    window.setAlert = (msg) => update(ref(db, 'global'), { alert: msg });
</script>

<script>
    let session = JSON.parse(localStorage.getItem('nev_sess'));
    window.currentPage = 'home';
    window.globalData = { places: {}, catalog: {}, groups: {}, alert: "" };

    async function toB64(fileInput) { 
        return new Promise(r => { 
            if(!fileInput.files || !fileInput.files[0]) return r(""); 
            const rd = new FileReader(); 
            rd.onload = () => r(rd.result); 
            rd.readAsDataURL(fileInput.files[0]); 
        }); 
    }

    function showPage(page) {
        window.currentPage = page;
        const c = document.getElementById('content');
        if(page === 'home') {
            const places = window.globalData.places ? Object.values(window.globalData.places) : [];
            c.innerHTML = `<h1>Global Games</h1>` + (places.length ? places.map(p => `
                <div class="card"><img src="${p.img || ''}"><b>${p.title}</b><br><small>By ${p.author}</small><br><br><button class="btn" onclick="window.open('${p.url}')">Play</button></div>
            `).join('') : "<p>No games published.</p>");
        }
        else if(page === 'catalog') {
            const items = window.globalData.catalog ? Object.values(window.globalData.catalog) : [];
            c.innerHTML = `<h1>Online Catalog</h1>` + items.map((i, idx) => `
                <div class="card">${i.limited ? '<div class="limited-tag">LIMITED</div>' : ''}<img src="${i.img || ''}"><b>${i.name}</b><br>T$ ${i.price}<br><br><button class="btn" onclick="buy(${idx})">Buy</button></div>
            `).join('');
        }
        else if(page === 'creations') {
            c.innerHTML = `<h1>Develop</h1><div style="background:#EEE;padding:25px;border:1px solid #CCC;">
                <h3>Publish Game</h3>
                <input id="pT" placeholder="Game Name"><input id="pU" placeholder="URL"><br>Icon: <input type="file" id="pI"><br>
                <button class="btn" onclick="addP()">Publish Online</button></div>`;
        }
        else if(page === 'admin') {
            c.innerHTML = `<h1>Admin Hub</h1><div style="border:2px solid red;padding:20px;">
                <input id="alertMsg" placeholder="Global Alert"><button class="btn" onclick="window.setAlert(document.getElementById('alertMsg').value)">Post</button><hr>
                <input id="iN" placeholder="Item Name"><input id="iP" placeholder="Price"><input type="file" id="iI"><br>Limited? <input type="checkbox" id="iL"><button class="btn" onclick="addC()">Upload Item</button></div>`;
        }
        else if(page === 'friends') {
            c.innerHTML = `<h1>Friends</h1><input id="fN" placeholder="Name"><button class="btn" onclick="addF()">Add Friend</button><ul>${(session.friends || []).map(f => `<li>${f}</li>`).join('')}</ul>`;
        }
        else if(page === 'settings') {
            c.innerHTML = `<h1>Settings</h1><button class="btn" style="background:red" onclick="localStorage.clear();location.reload();">Log Out</button>`;
        }
    }

    async function addP() { 
        const img = await toB64(document.getElementById('pI')); 
        const title = document.getElementById('pT').value;
        const url = document.getElementById('pU').value;
        if(!title || !url) return alert("Fill Name and URL!");
        window.pushPlace({ title, url, img, author: session.username }); 
    }

    async function addC() { 
        const img = await toB64(document.getElementById('iI')); 
        const name = document.getElementById('iN').value;
        const price = document.getElementById('iP').value;
        if(!name || !price) return alert("Fill Name and Price!");
        window.pushCatalog({ name, price, img, limited: document.getElementById('iL').checked }); 
    }

    function buy(idx) {
        const items = Object.values(window.globalData.catalog);
        const i = items[idx];
        if(session.tix >= i.price) {
            session.tix -= i.price;
            if(!session.inv) session.inv = [];
            session.inv.push(i);
            window.updateUser(session);
            alert("Success!");
        } else alert("Not enough T$!");
    }

    function addF() { if(!session.friends) session.friends = []; session.friends.push(document.getElementById('fN').value); window.updateUser(session); showPage('friends'); }

    if(session) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('u-disp').innerHTML = session.username + (session.bc ? ' <span class="bc-badge">BC</span>' : '');
        document.getElementById('tix-disp').innerText = "T$ " + session.tix;
        
        const ADMIN_LIST = ["T.vivdenko@outlook.com", "N.owner@outlook.com"];
        if(session.role === 'admin' || ADMIN_LIST.includes(session.email)) {
            const side = document.getElementById('sidebar');
            const adm = document.createElement('a'); adm.innerText = "ADMIN PANEL"; adm.style.color = "red"; adm.style.border = "2px dashed red"; adm.style.marginTop = "20px";
            adm.onclick = () => showPage('admin'); side.appendChild(adm);
        }
        showPage('home');
    }
</script>
</body>
</html>
